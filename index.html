<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LACIR | Banco de Questões em Câncer de Mama</title>
  <style>
    :root {
      --bg-deep: #071714;
      --bg-mid: #0c2822;
      --bg-soft: #123b32;
      --surface: #f7f5ef;
      --surface-strong: #ffffff;
      --surface-soft: #edf3ef;
      --line: rgba(17, 33, 29, 0.12);
      --line-strong: rgba(17, 33, 29, 0.2);
      --text: #12211d;
      --text-soft: #5e716a;
      --accent: #1f7a63;
      --accent-strong: #0f5f4c;
      --accent-soft: #dff3eb;
      --success: #187f5e;
      --success-soft: #dff5ea;
      --danger: #b04f4f;
      --danger-soft: #fae7e4;
      --warning: #d7be82;
      --petroleum: #1d4950;
      --shadow-lg: 0 24px 60px rgba(4, 18, 15, 0.18);
      --shadow-md: 0 16px 36px rgba(8, 24, 20, 0.12);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --transition: 220ms ease;
      --max-width: 1240px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Aptos", "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(215, 190, 130, 0.18), transparent 26%),
        radial-gradient(circle at 85% 15%, rgba(34, 112, 92, 0.3), transparent 24%),
        linear-gradient(145deg, var(--bg-deep), var(--bg-mid) 55%, var(--bg-soft));
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 120px 120px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.25), transparent 80%);
    }

    body::after {
      background:
        radial-gradient(circle at 20% 90%, rgba(31, 122, 99, 0.14), transparent 18%),
        radial-gradient(circle at 85% 82%, rgba(215, 190, 130, 0.12), transparent 18%);
      animation: ambientShift 18s ease-in-out infinite alternate;
    }

    button,
    input,
    summary {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
      color: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    summary:focus-visible {
      outline: 3px solid rgba(215, 190, 130, 0.85);
      outline-offset: 3px;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(calc(100% - 32px), var(--max-width));
      margin: 0 auto;
      padding: 22px 0 48px;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
      padding: 18px 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(7, 23, 20, 0.56);
      backdrop-filter: blur(16px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
    }

    .brand-button {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      padding: 0;
      color: #f6f2e6;
    }

    .brand-mark {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      position: relative;
      display: grid;
      place-items: center;
      background:
        linear-gradient(160deg, rgba(215, 190, 130, 0.25), rgba(255, 255, 255, 0.04)),
        rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(215, 190, 130, 0.3);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: linear-gradient(180deg, rgba(215, 190, 130, 0.8), rgba(31, 122, 99, 0.65));
      border-radius: 999px;
    }

    .brand-mark::before {
      width: 2px;
      height: 32px;
    }

    .brand-mark::after {
      width: 26px;
      height: 2px;
    }

    .brand-monogram {
      position: relative;
      z-index: 1;
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff5da;
      transform: translateY(1px);
    }

    .brand-copy strong {
      display: block;
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 1.25rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-copy small {
      display: block;
      margin-top: 2px;
      color: rgba(246, 242, 230, 0.78);
      font-size: 0.92rem;
      letter-spacing: 0.02em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .progress-pill {
      padding: 10px 14px;
      border-radius: 999px;
      color: #f2f0ea;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 0.92rem;
      letter-spacing: 0.02em;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .app-shell {
      min-height: calc(100vh - 156px);
    }

    .screen {
      animation: screenEnter 420ms cubic-bezier(0.2, 0.9, 0.2, 1);
    }

    .panel,
    .hero-panel,
    .stats-panel,
    .question-panel,
    .library-panel,
    .results-panel {
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 245, 239, 0.98));
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
      gap: 24px;
      align-items: stretch;
    }

    .hero-panel {
      padding: 36px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .hero-panel::before {
      content: "";
      position: absolute;
      inset: auto -10% -28% auto;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(31, 122, 99, 0.18), transparent 68%);
      z-index: -1;
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(31, 122, 99, 0.06), transparent 36%),
        linear-gradient(180deg, transparent, rgba(215, 190, 130, 0.06));
      z-index: -1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      background: rgba(17, 33, 29, 0.06);
      color: var(--accent-strong);
      border: 1px solid rgba(31, 122, 99, 0.15);
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--warning), var(--accent));
      box-shadow: 0 0 0 4px rgba(215, 190, 130, 0.16);
    }

    h1,
    h2,
    h3,
    h4 {
      margin: 0;
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      letter-spacing: 0.01em;
    }

    .hero-title {
      margin-top: 18px;
      font-size: clamp(2.3rem, 4vw, 4rem);
      line-height: 0.96;
      max-width: 11ch;
    }

    .hero-subtitle {
      margin: 18px 0 26px;
      max-width: 58ch;
      color: var(--text-soft);
      font-size: 1.03rem;
      line-height: 1.7;
    }

    .hero-actions,
    .stacked-actions,
    .question-actions,
    .library-actions,
    .results-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 20px;
      border-radius: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        background var(--transition),
        border-color var(--transition),
        color var(--transition);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      color: #f7f8f6;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 14px 30px rgba(15, 95, 76, 0.24);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(17, 33, 29, 0.04);
      border: 1px solid rgba(17, 33, 29, 0.09);
    }

    .btn-ghost {
      color: #f3efe3;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .btn-danger {
      color: var(--danger);
      background: var(--danger-soft);
      border: 1px solid rgba(176, 79, 79, 0.18);
    }

    .btn-small {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 14px;
      font-size: 0.94rem;
      font-weight: 600;
    }

    .menu-info {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    .mini-card,
    .stat-card,
    .insight-card,
    .result-stat,
    .side-card {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(17, 33, 29, 0.08);
      box-shadow: var(--shadow-md);
    }

    .mini-card strong,
    .stat-card strong,
    .result-stat strong,
    .side-card strong {
      display: block;
      font-size: 1.55rem;
      line-height: 1;
      margin-bottom: 8px;
    }

    .mini-card span,
    .stat-card span,
    .side-card span,
    .result-stat span {
      color: var(--text-soft);
      font-size: 0.92rem;
    }

    .stats-panel {
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-title p {
      margin: 8px 0 0;
      color: var(--text-soft);
      line-height: 1.6;
      font-size: 0.96rem;
    }

    .status-grid,
    .result-stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .insight-card {
      display: grid;
      gap: 10px;
    }

    .insight-card h3 {
      font-size: 1.04rem;
    }

    .insight-card p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .question-layout,
    .results-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.36fr);
      gap: 22px;
    }

    .question-panel,
    .library-panel,
    .results-panel {
      padding: 28px;
    }

    .top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .tag-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tag {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(31, 122, 99, 0.08);
      color: var(--accent-strong);
      border: 1px solid rgba(31, 122, 99, 0.14);
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .progress-card {
      display: grid;
      gap: 12px;
      padding: 18px;
      border-radius: 22px;
      background: var(--surface-soft);
      border: 1px solid rgba(17, 33, 29, 0.08);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .progress-header strong {
      font-size: 1.08rem;
    }

    .progress-header span {
      color: var(--text-soft);
      font-size: 0.93rem;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(17, 33, 29, 0.08);
      overflow: hidden;
      position: relative;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, rgba(31, 122, 99, 0.9), rgba(215, 190, 130, 0.95));
      box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.24);
      transition: width 320ms ease;
    }

    .question-statement {
      font-size: 1.08rem;
      line-height: 1.75;
      margin-bottom: 24px;
    }

    .alternatives {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
    }

    .alternative {
      width: 100%;
      text-align: left;
      padding: 18px 20px;
      border-radius: 20px;
      border: 1px solid rgba(17, 33, 29, 0.1);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(244, 247, 243, 0.96));
      box-shadow: var(--shadow-md);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      transition:
        transform var(--transition),
        border-color var(--transition),
        box-shadow var(--transition),
        background var(--transition);
    }

    .alternative:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: rgba(31, 122, 99, 0.28);
      box-shadow: 0 18px 28px rgba(10, 35, 29, 0.12);
    }

    .alternative:disabled {
      cursor: default;
    }

    .alternative-badge {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: rgba(17, 33, 29, 0.06);
      color: var(--accent-strong);
      align-self: start;
      transition: inherit;
    }

    .alternative-copy {
      display: grid;
      gap: 6px;
    }

    .alternative-copy strong {
      font-size: 1rem;
      line-height: 1;
    }

    .alternative-copy span {
      color: var(--text-soft);
      line-height: 1.65;
    }

    .alternative.is-correct {
      border-color: rgba(24, 127, 94, 0.3);
      background: linear-gradient(180deg, var(--success-soft), #f8fffb);
    }

    .alternative.is-correct .alternative-badge {
      background: var(--success);
      color: #ffffff;
    }

    .alternative.is-incorrect {
      border-color: rgba(176, 79, 79, 0.28);
      background: linear-gradient(180deg, var(--danger-soft), #fff8f6);
    }

    .alternative.is-incorrect .alternative-badge {
      background: var(--danger);
      color: #ffffff;
    }

    .alternative.is-muted {
      opacity: 0.72;
    }

    .feedback-box {
      border-radius: 22px;
      padding: 20px;
      border: 1px solid rgba(17, 33, 29, 0.08);
      background: rgba(17, 33, 29, 0.03);
      display: grid;
      gap: 10px;
      margin-bottom: 22px;
    }

    .feedback-box strong {
      font-size: 1.05rem;
    }

    .feedback-box p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.65;
    }

    .feedback-box.success {
      background: linear-gradient(180deg, var(--success-soft), rgba(255, 255, 255, 0.9));
      border-color: rgba(24, 127, 94, 0.18);
    }

    .feedback-box.success strong {
      color: var(--success);
    }

    .feedback-box.error {
      background: linear-gradient(180deg, var(--danger-soft), rgba(255, 255, 255, 0.9));
      border-color: rgba(176, 79, 79, 0.18);
    }

    .feedback-box.error strong {
      color: var(--danger);
    }

    .feedback-box.neutral strong {
      color: var(--accent-strong);
    }

    .side-rail {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .side-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(247, 245, 239, 0.96));
    }

    .side-card p {
      margin: 10px 0 0;
      color: var(--text-soft);
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .stacked-actions {
      margin-top: 18px;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
      margin-bottom: 22px;
    }

    .search-field {
      flex: 1 1 260px;
      min-height: 52px;
      padding: 0 18px;
      border-radius: 16px;
      border: 1px solid rgba(17, 33, 29, 0.12);
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      box-shadow: inset 0 1px 2px rgba(17, 33, 29, 0.04);
    }

    .library-list,
    .mistake-list {
      display: grid;
      gap: 16px;
    }

    .library-card,
    .mistake-card {
      border: 1px solid rgba(17, 33, 29, 0.08);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(243, 247, 244, 0.98));
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .library-card summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      cursor: pointer;
    }

    .library-card summary::-webkit-details-marker {
      display: none;
    }

    .summary-content {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .summary-content h3 {
      font-size: 1.06rem;
      line-height: 1.35;
    }

    .summary-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .chevron {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(17, 33, 29, 0.05);
      color: var(--accent-strong);
      transition: transform var(--transition), background var(--transition);
      flex-shrink: 0;
    }

    .library-card[open] .chevron {
      transform: rotate(180deg);
      background: rgba(31, 122, 99, 0.12);
    }

    .library-body {
      padding: 0 20px 20px;
      display: grid;
      gap: 18px;
    }

    .library-statement {
      color: var(--text);
      line-height: 1.7;
      margin-top: 2px;
    }

    .library-options {
      display: grid;
      gap: 12px;
    }

    .library-option {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(17, 33, 29, 0.035);
      border: 1px solid rgba(17, 33, 29, 0.08);
      display: grid;
      gap: 6px;
    }

    .library-option.correct {
      background: linear-gradient(180deg, var(--success-soft), rgba(255, 255, 255, 0.98));
      border-color: rgba(24, 127, 94, 0.18);
    }

    .library-option.user-wrong {
      background: linear-gradient(180deg, var(--danger-soft), rgba(255, 255, 255, 0.98));
      border-color: rgba(176, 79, 79, 0.18);
    }

    .library-option strong {
      font-size: 0.98rem;
    }

    .library-option p,
    .mistake-card p,
    .result-summary p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.65;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .status-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.9;
    }

    .status-pill.correct {
      color: var(--success);
      background: rgba(24, 127, 94, 0.08);
      border-color: rgba(24, 127, 94, 0.14);
    }

    .status-pill.incorrect {
      color: var(--danger);
      background: rgba(176, 79, 79, 0.08);
      border-color: rgba(176, 79, 79, 0.14);
    }

    .status-pill.pending {
      color: var(--petroleum);
      background: rgba(29, 73, 80, 0.08);
      border-color: rgba(29, 73, 80, 0.14);
    }

    .library-footer,
    .mistake-footer {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .score-ring-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .score-ring {
      --score: 0;
      width: 190px;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, var(--surface-strong) 0 56%, transparent 57%),
        conic-gradient(var(--accent) calc(var(--score) * 1%), rgba(17, 33, 29, 0.08) 0);
      display: grid;
      place-items: center;
      box-shadow:
        inset 0 0 0 1px rgba(17, 33, 29, 0.05),
        0 18px 36px rgba(10, 35, 29, 0.12);
    }

    .score-ring-value {
      display: grid;
      place-items: center;
      text-align: center;
      gap: 6px;
    }

    .score-ring-value strong {
      font-size: 2.5rem;
      line-height: 1;
    }

    function renderQuestion() {

        renderResults();
        return;
      }

      const stats = getStats();

    function handleAnswer(choice) {
      const question = questionBank[state.currentQuestionIndex];
      if (!question || state.answers[question.id]) {
        return;
      }

      if (!Object.prototype.hasOwnProperty.call(question.alternativas, choice)) {
        return;
      }

      state.answers[question.id] = {
        selected: choice,
        answeredAt: new Date().toISOString()
      };

      state.startedAt = state.startedAt || new Date().toISOString();
      state.lastUpdated = Date.now();
      saveProgress();
      renderQuestion();
    }

    function renderResults() {
      const stats = getStats();

      const performance = getPerformanceCopy(stats.percentage);

      app.innerHTML = `

          <aside class="side-rail">

            </div>

            <div class="side-card">
              <strong>Fluxo salvo</strong>
              <span>Persistência local</span>

            </div>
          </aside>
        </section>
      `;
    }

    function saveProgress() {
      try {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            version: STORAGE_VERSION,
            signature: QUESTION_SIGNATURE,
            currentScreen: state.currentScreen,
            currentQuestionIndex: state.currentQuestionIndex,
            answers: state.answers,
            startedAt: state.startedAt,
            lastUpdated: Date.now()
          })
        );
      } catch (error) {
        console.warn("Não foi possível salvar o progresso localmente.", error);
      }
    }

    function loadProgress() {
      const fallback = createInitialState();

      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return fallback;
        }

        const parsed = JSON.parse(raw);
        if (
          !parsed ||
          parsed.version !== STORAGE_VERSION ||
          parsed.signature !== QUESTION_SIGNATURE
        ) {
          return fallback;
        }

        const answers = {};

        for (const question of questionBank) {
          const storedAnswer = parsed.answers?.[question.id];
          if (
            storedAnswer &&
            typeof storedAnswer.selected === "string" &&
            Object.prototype.hasOwnProperty.call(question.alternativas, storedAnswer.selected)
          ) {
            answers[question.id] = {
              selected: storedAnswer.selected,
              answeredAt: storedAnswer.answeredAt || null
            };
          }
        }

        return {
          ...fallback,
          currentScreen: VALID_SCREENS.includes(parsed.currentScreen) ? parsed.currentScreen : "menu",
          currentQuestionIndex: Number.isInteger(parsed.currentQuestionIndex) ? parsed.currentQuestionIndex : 0,
          answers,
          startedAt: parsed.startedAt || null,
          lastUpdated: typeof parsed.lastUpdated === "number" ? parsed.lastUpdated : Date.now()
        };
      } catch (error) {
        console.warn("Não foi possível carregar o progresso salvo.", error);
        return fallback;
      }
    }

    function resetProgress(shouldRender = true) {
      state = createInitialState();
      uiState.allQuestionsFilter = "";

      try {
        localStorage.removeItem(STORAGE_KEY);
      } catch (error) {
        console.warn("Não foi possível limpar o progresso salvo.", error);
      }

      if (shouldRender) {
        renderCurrentScreen();
      }
    }

    function createInitialState() {
      return {
        version: STORAGE_VERSION,
        signature: QUESTION_SIGNATURE,
        currentScreen: "menu",
        currentQuestionIndex: 0,
        answers: {},
        startedAt: null,
        lastUpdated: Date.now()
      };
    }

    function normalizeState() {
      if (!Number.isInteger(state.currentQuestionIndex)) {
        state.currentQuestionIndex = 0;
      }

      state.currentQuestionIndex = Math.min(Math.max(state.currentQuestionIndex, 0), Math.max(questionBank.length - 1, 0));

      if (!VALID_SCREENS.includes(state.currentScreen)) {
        state.currentScreen = "menu";
      }

      const stats = getStats();
      if (state.currentScreen === "results" && !stats.completed) {
        state.currentScreen = "menu";
      }
    }

    function renderCurrentScreen() {
      normalizeState();
      updateHeaderProgress();

      if (state.currentScreen === "question") {
        renderQuestion();
        return;
      }

      if (state.currentScreen === "all") {
        renderAllQuestions();
        return;
      }

      if (state.currentScreen === "results") {
        renderResults();
        return;
      }

      renderMenu();
    }

    function handleClick(event) {
      const trigger = event.target.closest("[data-action], [data-global-action]");
      if (!trigger) {
        return;
      }

      const action = trigger.dataset.action || trigger.dataset.globalAction;

      switch (action) {
        case "menu":
          state.currentScreen = "menu";
          saveProgress();
          renderCurrentScreen();
          break;

        case "view-all":
          state.currentScreen = "all";
          saveProgress();
          renderCurrentScreen();
          break;

        case "start":
          startQuiz();
          break;

        case "results":
          if (getStats().completed) {
            state.currentScreen = "results";
            saveProgress();
            renderCurrentScreen();
          }
          break;

        case "answer":
          handleAnswer(trigger.dataset.choice);
          break;

        case "next":
          goToNextQuestion();
          break;

        case "reset":
          if (window.confirm("Deseja realmente reiniciar todo o progresso salvo neste navegador?")) {
            resetProgress(true);
          }
          break;

        case "restart":
          if (window.confirm("Deseja refazer o banco do zero?")) {
            resetProgress(false);
            state.currentScreen = "question";
            saveProgress();
            renderCurrentScreen();
          }
          break;

        case "open-question": {
          const questionIndex = Number(trigger.dataset.index);
          if (Number.isInteger(questionIndex) && questionIndex >= 0 && questionIndex < questionBank.length) {
            state.currentQuestionIndex = questionIndex;
            state.currentScreen = "question";
            saveProgress();
            renderCurrentScreen();
          }
          break;
        }

        case "clear-filter":
          uiState.allQuestionsFilter = "";
          renderAllQuestions();
          break;

        default:
          break;
      }
    }

    function handleInput(event) {
      if (event.target.matches("[data-role='question-filter']")) {
        const filterValue = event.target.value;
        uiState.allQuestionsFilter = filterValue;
        renderAllQuestions();

        const input = app.querySelector("[data-role='question-filter']");
        if (input) {
          input.focus();
          input.setSelectionRange(filterValue.length, filterValue.length);
        }
      }
    }

    function startQuiz() {
      const stats = getStats();
      if (stats.completed) {
        state.currentScreen = "results";
        saveProgress();
        renderCurrentScreen();
        return;
      }

      const nextUnansweredIndex = findFirstUnansweredIndex(state.currentQuestionIndex);
      state.currentQuestionIndex = nextUnansweredIndex === -1 ? 0 : nextUnansweredIndex;
      state.currentScreen = "question";
      state.startedAt = state.startedAt || new Date().toISOString();
      saveProgress();
      renderCurrentScreen();
    }

    function goToNextQuestion() {
      const nextIndex = state.currentQuestionIndex + 1;

      if (nextIndex >= questionBank.length) {
        state.currentScreen = "results";
        saveProgress();
        renderCurrentScreen();
        return;
      }

      state.currentQuestionIndex = nextIndex;
      state.currentScreen = "question";
      saveProgress();
      renderCurrentScreen();
    }

    function findFirstUnansweredIndex(startIndex = 0) {
      for (let index = startIndex; index < questionBank.length; index += 1) {
        if (!state.answers[questionBank[index].id]) {
          return index;
        }
      }

      for (let index = 0; index < startIndex; index += 1) {
        if (!state.answers[questionBank[index].id]) {
          return index;
        }
      }

      return -1;
    }

    function getStats() {
      const answeredEntries = questionBank
        .map((question) => ({
          question,
          answer: state.answers[question.id] || null
        }))
        .filter((entry) => entry.answer);

      const correct = answeredEntries.filter((entry) => entry.answer.selected === entry.question.correta).length;
      const answered = answeredEntries.length;
      const total = questionBank.length;
      const incorrect = answered - correct;
      const percentage = total ? Math.round((correct / total) * 100) : 0;

      return {
        total,
        answered,
        correct,
        incorrect,
        remaining: total - answered,
        percentage,
        completed: answered === total && total > 0
      };
    }

    function getMistakes() {
      return questionBank
        .filter((question) => {
          const answer = state.answers[question.id];
          return answer && answer.selected !== question.correta;
        })
        .map((question) => ({
          question,
          answer: state.answers[question.id],
          index: questionBank.findIndex((candidate) => candidate.id === question.id)
        }));
    }

    function renderAlternative(question, answer, letter, text) {
      const answered = Boolean(answer);
      const isCorrect = answered && letter === question.correta;
      const isIncorrectSelection = answered && answer.selected === letter && answer.selected !== question.correta;
      const muted = answered && !isCorrect && !isIncorrectSelection;

      return `
        <button
          class="alternative ${isCorrect ? "is-correct" : ""} ${isIncorrectSelection ? "is-incorrect" : ""} ${muted ? "is-muted" : ""}"
          data-action="answer"
          data-choice="${letter}"
          ${answered ? "disabled" : ""}
        >
          <span class="alternative-badge">${letter}</span>
          <span class="alternative-copy">
            <strong>Alternativa ${letter}</strong>
            <span>${escapeHtml(text)}</span>
          </span>
        </button>
      `;
    }

    function renderFeedback(question, answer) {
      if (!answer) {
        return `
          <section class="feedback-box neutral" role="status">
            <strong>Resposta imediata ativada</strong>
            <p>Escolha uma alternativa para travar a questão, visualizar o gabarito correto e seguir com a pontuação preservada.</p>
          </section>
        `;
      }

      const selected = answer.selected;
      const correct = question.correta;
      const isCorrect = selected === correct;

      return `
        <section class="feedback-box ${isCorrect ? "success" : "error"}" role="status">
          <strong>${isCorrect ? "Correto" : "Incorreto"}</strong>
          <p>
            ${isCorrect
              ? `Você marcou a alternativa ${escapeHtml(selected)}, que é a correta.`
              : `Você marcou a alternativa ${escapeHtml(selected)}, mas a correta é ${escapeHtml(correct)}.`}
          </p>
          ${renderCommentBlock(question)}
        </section>
      `;
    }

    function renderCommentBlock(question) {
      const comment = typeof question.comentario === "string" ? question.comentario.trim() : "";
      if (!comment) {
        return "";
      }

      return `
        <div class="progress-card">
          <div class="progress-header">
            <strong>Comentário do gabarito</strong>
            <span>Campo já suportado pela arquitetura</span>
          </div>
          <p class="muted">${escapeHtml(comment)}</p>
        </div>
      `;
    }

    function renderQuestionLibraryCard(question, query) {
      const answer = state.answers[question.id] || null;
      const isCorrect = answer ? answer.selected === question.correta : false;
      const cardStatus = answer ? (isCorrect ? renderStatusPill("correct", "Respondida corretamente") : renderStatusPill("incorrect", "Respondida incorretamente")) : renderStatusPill("pending", "Ainda não respondida");
      const index = questionBank.findIndex((entry) => entry.id === question.id);
      const shouldOpen = Boolean(query);

      return `
        <details class="library-card" ${shouldOpen ? "open" : ""}>
          <summary>
            <div class="summary-content">
              <h3>Questão ${question.id}</h3>
              <div class="summary-meta">
                <span>${escapeHtml(question.tema)}</span>
                <span>${Object.keys(question.alternativas).length} alternativas</span>
                <span>${answer ? `Sua marcação: ${escapeHtml(answer.selected)}` : "Sem resposta"}</span>
              </div>
            </div>

            <div style="display:flex;align-items:center;gap:12px;">
              ${cardStatus}
              <span class="chevron" aria-hidden="true">⌄</span>
            </div>
          </summary>

          <div class="library-body">
            <p class="library-statement">${escapeHtml(question.enunciado)}</p>

            <div class="library-options">
              ${Object.entries(question.alternativas).map(([letter, text]) => `
                <div class="library-option ${letter === question.correta ? "correct" : ""} ${answer && answer.selected === letter && answer.selected !== question.correta ? "user-wrong" : ""}">
                  <strong>${letter}. ${escapeHtml(text)}</strong>
                  <p>
                    ${letter === question.correta
                      ? "Gabarito correto."
                      : answer && answer.selected === letter
                        ? "Alternativa que você marcou."
                        : "Alternativa disponível."}
                  </p>
                </div>
              `).join("")}
            </div>

            ${renderCommentBlock(question)}

            <div class="library-footer">
              <div class="summary-meta">
                <span>Gabarito: ${escapeHtml(question.correta)}</span>
                <span>${answer ? `Sua resposta: ${escapeHtml(answer.selected)}` : "Sem tentativa registrada"}</span>
              </div>

              <button class="btn btn-secondary btn-small" data-action="open-question" data-index="${index}">Abrir no modo questão</button>
            </div>
          </div>
        </details>
      `;
    }

    function renderMistakeCard(item) {
      return `
        <article class="mistake-card">
          <div class="top-row" style="margin-bottom: 0;">
            <div>
              <h3>Questão ${item.question.id}</h3>
              <p>${escapeHtml(item.question.enunciado)}</p>
            </div>
            ${renderStatusPill("incorrect", "Revisar")}
          </div>

          <div class="progress-card">
            <div class="progress-header">
              <strong>Revisão objetiva</strong>
              <span>Comparação entre resposta marcada e gabarito</span>
            </div>
            <p class="muted">Você marcou <strong>${escapeHtml(item.answer.selected)}</strong>. A alternativa correta é <strong>${escapeHtml(item.question.correta)}</strong>.</p>
          </div>

          <div class="mistake-footer">
            <div class="summary-meta">
              <span>Correta: ${escapeHtml(item.question.correta)}</span>
              <span>Marcada: ${escapeHtml(item.answer.selected)}</span>
            </div>
            <button class="btn btn-secondary btn-small" data-action="open-question" data-index="${item.index}">Reabrir questão</button>
          </div>
        </article>
      `;
    }

    function questionMatchesFilter(question, query) {
      if (!query) {
        return true;
      }

      const normalizedQuery = normalizeText(query);
      const searchableText = normalizeText(
        [
          question.id,
          question.tema,
          question.enunciado,
          question.correta,
          Object.entries(question.alternativas)
            .map(([letter, text]) => `${letter} ${text}`)
            .join(" ")
        ].join(" ")
      );

      return searchableText.includes(normalizedQuery);
    }

    function normalizeText(value) {
      return String(value)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function renderStatusPill(kind, label) {
      return `<span class="status-pill ${kind}">${escapeHtml(label)}</span>`;
    }

    function getPerformanceCopy(percentage) {
      if (percentage >= 90) {
        return {
          title: "Domínio consistente do tema",
          description: "Seu desempenho foi excelente. O padrão de respostas sugere domínio sólido dos principais tópicos do banco.",
          short: "Excelente consistência clínica e teórica."
        };
      }

      if (percentage >= 75) {
        return {
          title: "Ótimo desempenho",
          description: "A base está muito boa. Vale revisar apenas os pontos em que houve erro para refinar segurança nas decisões clínicas.",
          short: "Boa precisão, com poucos pontos de ajuste."
        };
      }

      if (percentage >= 60) {
        return {
          title: "Bom caminho, com espaço para lapidar",
          description: "O desempenho mostra entendimento relevante, mas ainda existem áreas que merecem revisão atenta para ganhar consistência.",
          short: "Há boa base, mas a revisão vai elevar o nível."
        };
      }

      return {
        title: "Hora de revisar com método",
        description: "O banco já indicou onde concentrar energia. Refaça as questões erradas, compare as alternativas e avance em blocos curtos.",
        short: "Revisão focada agora tende a gerar grande ganho."
      };
    }

    function updateHeaderProgress() {
      const stats = getStats();
      headerProgress.textContent = `${stats.answered} de ${stats.total} respondidas`;
    }

    function formatPercentage(value) {
      return `${Math.round(value)}%`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }
  </script>
</body>
</html>
